name: EAS Build Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      # Create a proper eas.json (local version source to avoid warnings)
      - name: Create eas.json
        run: |
          cat > eas.json <<EOF
          {
            "cli": {
              "appVersionSource": "local",
              "version": ">= 10.0.0"
            },
            "build": {
              "preview": {
                "android": {
                  "buildType": "apk"
                }
              }
            }
          }
          EOF

      # Extract project slug and owner from app.json
      - name: Get project slug and owner
        id: config
        run: |
          SLUG=$(node -p "require('./app.json').expo.slug")
          OWNER=$(node -p "require('./app.json').expo.owner || '${EXPO_USERNAME}'")
          echo "SLUG=$SLUG" >> $GITHUB_ENV
          echo "OWNER=$OWNER" >> $GITHUB_ENV
        env:
          EXPO_USERNAME: ${{ secrets.EXPO_USERNAME }}

      # Install EAS CLI
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # Initialize EAS project (non‑interactive)
      - name: Initialize EAS
        run: eas init --id ${{ env.OWNER }}/${{ env.SLUG }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # Build the APK
      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}